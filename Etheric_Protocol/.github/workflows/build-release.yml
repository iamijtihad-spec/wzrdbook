name: Build & Release Enki Node

on:
  push:
    tags:
      - 'v*'           # Triggers on any tag like v1.0.0-alpha, v1.1.0, etc.
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  # ── macOS arm64 ────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (arm64)
    runs-on: macos-14   # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pyinstaller-hooks-contrib

      - name: Build with PyInstaller
        run: pyinstaller build/enki_node.spec --distpath dist --workpath /tmp/pyinstaller_work --noconfirm

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Package .dmg
        run: |
          create-dmg \
            --volname "Enki Node" \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "EnkiNode.app" 200 190 \
            --hide-extension "EnkiNode.app" \
            --app-drop-link 400 185 \
            "dist/EnkiNode-mac.dmg" \
            "dist/EnkiNode.app"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/EnkiNode-mac.dmg
            dist/EnkiNode

  # ── Windows x64 ────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pyinstaller-hooks-contrib windows-curses

      - name: Build with PyInstaller
        run: pyinstaller build/enki_node.spec --distpath dist --workpath C:/tmp/pyinstaller_work --noconfirm

      - name: Rename output
        run: mv dist/EnkiNode dist/EnkiNode.exe

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/EnkiNode.exe

  # ── Linux x64 (bonus — Raspberry Pi OS compatible) ─────────────────────────
  build-linux:
    name: Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system audio deps
        run: sudo apt-get install -y portaudio19-dev libbluetooth-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pyinstaller-hooks-contrib

      - name: Build with PyInstaller
        run: pyinstaller build/enki_node.spec --distpath dist --workpath /tmp/pyinstaller_work --noconfirm

      - name: Rename output
        run: mv dist/EnkiNode dist/EnkiNode-linux-x64

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/EnkiNode-linux-x64
